name: NK_LS_POST82
variables: [g, z, r, x, Pi]
constrained:
  Pi: false
  x: false
  r: false
  g: false
  z: false
parameters: [beta, kappa, tau_inv, psi_pi, psi_x, rho_r, rho_g, rho_z, pi_star, r_star,
  sig_r, sig_g, sig_z, rho_gz, meas_infl, meas_rate, meas_outgap, meas_rho_ir, meas_rho_gi,
  meas_rho_gr, x_const, r_const]
shock_map:
  e_g: g
  e_z: z
  e_r: r
observables: [OutGap, Infl, Rate]
equations:
  model:
  - Pi(t) = beta*Pi(t+1) + kappa*(x(t) - z(t))
  - x(t) = x(t+1) - tau_inv*(r(t) - Pi(t+1)) + g(t)
  - r(t) = rho_r*r(t-1) + (1 - rho_r)*(psi_pi*Pi(t) + psi_x*(x(t) - z(t))) + e_r
  - g(t) = rho_g*g(t-1) + e_g
  - z(t) = rho_z*z(t-1) + e_z
  constraint: {}
  observables:
    OutGap: x(t) + r_const*r(t) + x_const*x(t)
    Infl: 4*Pi(t) + pi_star
    Rate: 4*r(t) + (r_star + pi_star)
calibration:
  parameters:
    beta: 0.999
    kappa: 0.295
    tau_inv: 0.23
    psi_pi: 4.746
    psi_x: 0.428
    rho_r: 0.751
    rho_g: 0.883
    rho_z: 0.879
    pi_star: 3.43
    r_star: 3.01
    sig_r: 0.012
    sig_g: 0.077
    sig_z: 0.434
    rho_gz: 0.536
    meas_infl: 0.498
    meas_rate: 0.506
    meas_outgap: 0.503
    meas_rho_ir: -0.052
    meas_rho_gi: 0.04
    meas_rho_gr: 0.103
    x_const: 0.091
    r_const: 0.679
  shocks:
    std:
      e_g: sig_g
      e_z: sig_z
      e_r: sig_r
    corr:
      e_g, e_z: rho_gz
kalman:
  y: [OutGap, Infl, Rate]
  R:
    std:
      OutGap: meas_outgap
      Infl: meas_infl
      Rate: meas_rate
    corr:
      Infl, Rate: meas_rho_ir
      OutGap, Infl: meas_rho_gi
      OutGap, Rate: meas_rho_gr
  P0:
    mode: diag
    scale: 1.0
    diag:
      g: 1.0
      z: 1.0
      r: 1.0
      Pi: 1.0
      x: 1.0
  jitter: 1e-10
  symmetrize: true
