name: "NK_LS_POST82"

variables: [g, z, r, x, Pi]
constrained:
  Pi: false
  x: false
  r: false
  g: false
  z: false

parameters:
  [
    beta,
    kappa,
    tau_inv,
    psi_pi,
    psi_x,
    rho_r,
    rho_g,
    rho_z,
    pi_star,
    r_star,
    sig_r,
    sig_g,
    sig_z,
    rho_gz,
    meas_infl,
    meas_rate,
    meas_outgap,
    meas_rho_ir,
    meas_rho_gi,
    meas_rho_gr,
    Pi_coef,
    x_coef,
    r_coef,
  ]

shock_map:
  e_g: g
  e_z: z
  e_r: r

observables: [OutGap, Infl, Rate]

equations:
  model:
    - Pi(t) = beta*Pi(t+1) + kappa*(x(t) - z(t))
    - x(t) = x(t+1) - tau_inv*(r(t) - Pi(t+1)) + g(t)
    - r(t) = rho_r*r(t-1) + (1 - rho_r)*(psi_pi*Pi(t) + psi_x*(x(t) - z(t))) + e_r
    - g(t) = rho_g*g(t-1) + e_g
    - z(t) = rho_z*z(t-1) + e_z

  constraint: {}

  observables:
    OutGap: x(t) + Pi_coef*Pi(t) + x_coef*x(t) + r_coef*r(t)
    Infl: 4*Pi(t) + pi_star
    Rate: 4*r(t) + (r_star + pi_star)

calibration:
  parameters:
    beta: 0.971
    psi_pi: 2.19
    psi_x: 0.30
    rho_r: 0.84
    pi_star: 3.43
    r_star: 3.01
    kappa: 0.58
    tau_inv: 1.86
    rho_g: 0.83
    rho_z: 0.85
    rho_gz: 0.36
    sig_r: 0.18
    sig_g: 0.18
    sig_z: 0.64
    meas_infl: 1e-6
    meas_rate: 1e-6
    meas_outgap: 1e-6
    meas_rho_ir: 0.0
    meas_rho_gi: 0.0
    meas_rho_gr: 0.0
    Pi_coef: 0.0
    x_coef: 0.0
    r_coef: 0.0

  shocks:
    std:
      e_g: sig_g
      e_z: sig_z
      e_r: sig_r
    corr:
      e_g, e_z: rho_gz

kalman:
  y: [OutGap, Infl, Rate]

  R:
    std:
      OutGap: meas_outgap
      Infl: meas_infl
      Rate: meas_rate
    corr:
      Infl, Rate: meas_rho_ir
      OutGap, Infl: meas_rho_gi
      OutGap, Rate: meas_rho_gr
  P0:
    mode: diag
    scale: 1.0
    diag:
      g: 1.0
      z: 1.0
      r: 1.0
      Pi: 1.0
      x: 1.0

  jitter: 1e-10
  symmetrize: true
