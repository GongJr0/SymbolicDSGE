name: Tests & badges

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "coverage/*.svg"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13.9"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Run Pre-Commit Checks
        uses: pre-commit/action@v3.0.1

      - name: Run tests with coverage
        run: uv run pytest -q ./tests --cov --cov-report=term-missing --cov-report=xml:coverage/coverage.xml

      - name: Compute coverage percent
        id: cov
        shell: bash
        run: |
          python - << 'PY'
          import os
          import xml.etree.ElementTree as ET
          tree = ET.parse("coverage/coverage.xml")
          root = tree.getroot()
          rate = float(root.attrib["line-rate"]) * 100.0
          rounded = round(rate)
          print(f"Coverage: {rate:.2f}%")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"percent={rounded}\n")
          PY

      - name: Generate coverage badge
        run: >
          curl -fsSL -o coverage/coverage-badge.svg
          "https://img.shields.io/badge/coverage-${{ steps.cov.outputs.percent }}%25-2e7d32?style=flat&labelColor=333333"

      - name: Generate tests badge
        run: >
          curl -fsSL -o coverage/tests-badge.svg
          "https://img.shields.io/badge/tests-passing-2e7d32?style=flat&labelColor=333333"

      - name: Commit updated badges
        if: ${{ github.event_name == 'push' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add coverage/*.svg

          if git diff --cached --quiet; then
            echo "No badge changes to commit."
            exit 0
          fi

          git commit -m "ci: update badges"
          git push

  test_failed_badge:
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ always() && needs.test.result == 'failure' && github.event_name == 'push' }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate failing tests badge
        uses: emibcn/badge-action@v2
        with:
          label: tests
          status: failing
          color: red
          path: coverage/tests-badge.svg

      - name: Commit failing badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add coverage/tests-badge.svg

          if git diff --cached --quiet; then
            echo "No badge changes to commit."
            exit 0
          fi

          git commit -m "ci: update failing badge"
          git push
