name: UI Build

on:
  push:
    branches:
      - main
    paths:
      - "sdsge-ui/frontend/**"
      - ".github/workflows/ui-build.yml"
  pull_request:
    paths:
      - "sdsge-ui/frontend/**"
      - ".github/workflows/ui-build.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdsge-ui/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: sdsge-ui/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # `npm run build` runs `tsc --noEmit` (x2) then `vite build`, so this also
      # type-checks the frontend and gates merges on a clean build.
      - name: Type-check and build
        run: npm run build
        env:
          VITE_SDSGE_API_BASE: ""
